<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div style="text-align:center;margin-bottom:20px;">
                <div style="width:64px;height:64px;background:linear-gradient(135deg,#1e3a5f,#111827);border:2px solid #60a5fa;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px;font-weight:800;color:#60a5fa;letter-spacing:1px;">CIA</div>
            </div>
            <h2>تسجيل الدخول</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم">
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور">
                </div>
                <button type="submit">تسجيل الدخول</button>
                <p id="errorMsg" class="error">اسم المستخدم أو كلمة المرور غير صحيحة</p>
                <div style="margin-top:16px;padding:10px;background:#0f172a;border-radius:8px;text-align:center;font-size:11px;color:#6b7280;border:1px solid #1f2937;">
                    بيانات الاختبار: <strong style="color:#9ca3af;">user1</strong> / <strong style="color:#9ca3af;">12345678</strong>
                </div>
            </form>
        </div>
    </div>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
