<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفرع - CIA</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/branch.css">
</head>
<body>
    <nav class="navbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="dashboard.html" class="btn-back">← العودة للوحة الرئيسية</a>
            <span class="logo">CIA <span class="logo-sub" id="branchNavTitle">| الفرع</span></span>
        </div>
        <div class="user-info">
            <span id="welcomeUser">مرحباً</span>
            <button onclick="logout()">تسجيل الخروج</button>
        </div>
    </nav>

    <div class="branch-page">
        <div class="branch-sidebar">
            <h3>🗺️ الفروع</h3>
            <svg class="sidebar-map" id="sidebarMap" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="sidebar-branches" id="sidebarBranches"></div>
        </div>

        <div class="branch-content">
            <div class="branch-header">
                <h1 class="branch-title" id="branchTitle"></h1>
                <div class="branch-subtitle" id="branchSubtitle"></div>
                <div class="branch-info" id="branchInfo"></div>
            </div>

            <div class="floors-container" id="floorsContainer"></div>

            <div class="protocols-section">
                <h3>🔒 البروتوكولات الأمنية المستخدمة</h3>
                <div class="protocols-grid" id="protocolsGrid"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="employeeModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-avatar" id="modalAvatar">JS</div>
            <div class="modal-name" id="modalName">---</div>
            <div class="modal-rank" id="modalRank">---</div>
            <div class="modal-details" id="modalDetails"></div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/branch.js"></script>
</body>
</html>
